name: Günlük 10 Dakikalık Yazı Fikri Üret

on:
  schedule:
    # Türkiye saatiyle her gece tam 00:01'de çalışır (UTC 21:01)
    - cron: "1 21 * * *"
  workflow_dispatch: {} # İstediğin an elinle başlatabilmen için

permissions:
  contents: write

jobs:
  fikir-uret:
    runs-on: ubuntu-latest
    steps:
      - name: Repo'yu çek
        uses: actions/checkout@v4

      - name: Python Kur
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: GitHub Copilot ile Fikir Üret
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }} # Tamamen güvenli dahili şifre
        run: |
          # Copilot eklentisini kuruyoruz
          gh extension install github/gh-copilot
          
          # Copilot'a 10 dakikalık yazı görevi veriyoruz
          PROMPT="Bana 10 dakikada hızlıca üzerine düşünüp yazabileceğim, Türk dili, teknoloji, yapay zeka veya felsefe odaklı yaratıcı bir Türkçe yazı konusu öner. Sadece başlık ve kısa bir ilham cümlesi olsun."
          AI_CEVAP=$(gh copilot explain "$PROMPT" --json | jq -r '.explanation' || echo "Günün Konusu: Dijital çağda odaklanma becerisi.")
          
          # Çıktıyı sonraki adımda kullanmak üzere kaydediyoruz
          echo "AI_OUT=$AI_CEVAP" >> $GITHUB_ENV

      - name: Klasörü ve Dosyayı Oluştur
        run: python3 scripts/generate_prompt.py "${{ env.AI_OUT }}"

      - name: Değişiklikleri Kaydet ve Push Et
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add yazi-fikri/
          git diff --quiet && git diff --staged --quiet || git commit -m "chore: günün 10 dakikalık yazı fikri eklendi 🧠"
          git push
